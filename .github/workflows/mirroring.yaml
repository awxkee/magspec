name: Mirror to GitLab

on:
  push:
    branches: [ 'master' ]
    tags:
      - '*'

jobs:
  mirror:
    runs-on: ubuntu-latest
    environment: mirroring
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/awxkee/magspec
          git push gitlab --all
          git push gitlab --tags